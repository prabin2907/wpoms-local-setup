name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  VERSION_PREFIX: "v1.0"

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Frontend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: wpoms-frontend-p
        COMMIT_SHA: ${{ github.sha }}
        BUILD_NUMBER: ${{ github.run_number }}
      run: |
        # Build with commit SHA
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA ./wpoms_web

        # Tag 1: Date + Commit SHA
        DATE_TAG=$(date +%Y-%m-%d)-$COMMIT_SHA
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:$DATE_TAG

        # Tag 2: Version (v1.0.1, v1.0.2, etc.)
        VERSION_TAG=${{ env.VERSION_PREFIX }}.$BUILD_NUMBER
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG

        # Push all tags
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$DATE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG

    - name: Build and push Backend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: wpoms-backend-p
        COMMIT_SHA: ${{ github.sha }}
        BUILD_NUMBER: ${{ github.run_number }}
      run: |
        # Build with commit SHA
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA ./wpoms_admin

        # Tag 1: Date + Commit SHA
        DATE_TAG=$(date +%Y-%m-%d)-$COMMIT_SHA
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:$DATE_TAG

        # Tag 2: Version (v1.0.1, v1.0.2, etc.)
        VERSION_TAG=${{ env.VERSION_PREFIX }}.$BUILD_NUMBER
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG

        # Push all tags
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_SHA
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$DATE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG

    - name: Generate final docker-compose.yml
      run: |
        sed -e "s|__ECR_REGISTRY__|${{ steps.login-ecr.outputs.registry }}|g" \
            docker-compose.ec2.yml > docker-compose.yml

    - name: Upload docker-compose.yml to S3
      run: |
        aws s3 cp docker-compose.yml s3://wpoms-deploy-artifacts-p/docker-compose.yml

