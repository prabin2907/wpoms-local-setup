name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  VERSION_PREFIX: "v1.0"
  ECR_REPOSITORY_FRONTEND: "wpoms-frontend-p"
  ECR_REPOSITORY_BACKEND: "wpoms-backend-p"

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.ecr.outputs.registry }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push
      env:
        ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        COMMIT_SHA: ${{ github.sha }}
        BUILD_NUMBER: ${{ github.run_number }}
        VERSION_PREFIX: ${{ env.VERSION_PREFIX }}
        ECR_REPOSITORY_FRONTEND: ${{ env.ECR_REPOSITORY_FRONTEND }}
        ECR_REPOSITORY_BACKEND: ${{ env.ECR_REPOSITORY_BACKEND }}
      run: |
        chmod +x ./scripts/build.sh
        ./scripts/build.sh

    - name: Upload to S3
      env:
        ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        S3_BUCKET: ${{ env.S3_BUCKET }}
      run: |
        chmod +x ./scripts/upload-s3.sh
        ./scripts/upload-s3.sh

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_REGION,ECR_REGISTRY,S3_BUCKET,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
        script: |
          export ECR_REGISTRY=${{ needs.build-and-push.outputs.ecr_registry }}

          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set default.region $AWS_REGION

          aws s3 cp s3://$S3_BUCKET/deploy.sh /home/ubuntu/deploy.sh
          chmod +x /home/ubuntu/deploy.sh
          /home/ubuntu/deploy.sh

  summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Generate Summary
      env:
        VERSION_PREFIX: ${{ env.VERSION_PREFIX }}
        BUILD_NUMBER: ${{ github.run_number }}
        S3_BUCKET: ${{ env.S3_BUCKET }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
        COMMIT_SHA: ${{ github.sha }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        chmod +x ./scripts/summary.sh
        ./scripts/summary.sh