name: Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # 4. Build frontend image
      - name: Build frontend image
        run: |
          docker build -t wpoms-frontend-p:${{ github.sha }} ./wpoms_web

      # 5. Build backend image
      - name: Build backend image
        run: |
          docker build -t wpoms-backend-p:${{ github.sha }} ./wpoms_admin

      # 6. Tag frontend image for ECR
      - name: Tag frontend image
        run: |
          docker tag wpoms-frontend-p:${{ github.sha }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/wpoms-frontend-p:${{ github.sha }}

      # 7. Tag backend image for ECR
      - name: Tag backend image
        run: |
          docker tag wpoms-backend-p:${{ github.sha }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/wpoms-backend-p:${{ github.sha }}

      # 8. Push frontend image to ECR
      - name: Push frontend image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/wpoms-frontend-p:${{ github.sha }}

      # 9. Push backend image to ECR
      - name: Push backend image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/wpoms-backend-p:${{ github.sha }}